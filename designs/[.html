+<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SymbiOSis Zen</title>
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: serif; font-style: italic; overflow: hidden; }
        .quote-container { text-align: center; max-width: 600px; z-index: 10; animation: fadeInOut 10s infinite; }
        .quote { font-size: 2rem; line-height: 1.5; margin-bottom: 20px; }
        .author { font-size: 1.2rem; opacity: 0.5; letter-spacing: 5px; text-transform: uppercase; }
        @keyframes fadeInOut { 0%, 100% { opacity: 0; transform: scale(0.95); } 20%, 80% { opacity: 1; transform: scale(1); } }
        .bg-fog { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: 1; }
    </style>
</head>
<body>
    <div class="bg-fog"></div>
    <div class="quote-container">
        <div class="quote" id="quote">"La felicidad de tu vida depende de la calidad de tus pensamientos."</div>
        <div class="author" id="author">Marco Aurelio</div>
    </div>
    <script>
        const quotes = [
            {q: "La felicidad de tu vida depende de la calidad de tus pensamientos.", a: "Marco Aurelio"},
            {q: "No es que tengamos poco tiempo, es que perdemos mucho.", a: "Séneca"},
            {q: "El hombre no está preocupado tanto por problemas reales como por sus ansiedades imaginarias.", a: "Epicteto"},
            {q: "Donde hay un ser humano, hay una oportunidad para la amabilidad.", a: "Séneca"},
            {q: "Todo lo que escuchamos es una opinión, no un hecho.", a: "Marco Aurelio"}
        ];
        let idx = 0;
        function nextQuote() {
            idx = (idx + 1) % quotes.length;
            document.getElementById('quote').textContent = `"${quotes[idx].q}"`;
            document.getElementById('author').textContent = quotes[idx].a;
        }
        setInterval(nextQuote, 10000);
    </script>
</body>
</html>
