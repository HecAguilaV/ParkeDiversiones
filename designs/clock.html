<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SymbiOSis Premium Clock</title>
    <style>
        :root {
            --color1: #1a2a6c;
            --color2: #b21f1f;
            --color3: #fdbb2d;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Mesh Gradient Background */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #0f2027, #203a43, #2c5364);
            filter: blur(50px);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: move 20s infinite alternate;
        }

        .blob1 { background: #4e54c8; top: -10%; left: -10%; }
        .blob2 { background: #8f94fb; bottom: -10%; right: -10%; animation-delay: -5s; }
        .blob3 { background: #00f2fe; top: 40%; left: 30%; animation-duration: 25s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 60px 100px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            color: white;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .time {
            font-size: 8rem;
            font-weight: 200;
            margin: 0;
            letter-spacing: -5px;
            line-height: 1;
        }

        .date {
            font-size: 1.5rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-top: 20px;
            opacity: 0.6;
        }

        .branding {
            margin-top: 40px;
            font-size: 0.8rem;
            letter-spacing: 5px;
            opacity: 0.3;
        }
        .branding span {
            font-weight: 800;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="glass-card">
        <div class="time" id="clock">00:00</div>
        <div class="date" id="date">LUNES, 01 ENERO</div>
        <div class="branding">SYMBI<span>OS</span>IS v1.0</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Hora
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            // Fecha
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            let dateStr = now.toLocaleDateString('es-ES', options);
            document.getElementById('date').textContent = dateStr.toUpperCase();
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
