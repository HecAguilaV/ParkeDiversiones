<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Hector's Macintosh 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #72a0a0;
            /* Classic muted teal/grey */
            --mac-border: #000;
            --mac-window-bg: #fff;
            --mac-title-bg: #fff;
            --pixel-font: 'Silkscreen', cursive;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: var(--pixel-font);
            cursor: default;
        }

        /* Desktop Grid Pattern */
        .desktop {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(0, 0, 0, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Macintosh Window Style */
        .window {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 380px;
            background: var(--mac-window-bg);
            border: 2px solid var(--mac-border);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.2);
            z-index: 100;
        }

        .title-bar {
            height: 24px;
            border-bottom: 2px solid var(--mac-border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: repeating-linear-gradient(0deg,
                    #fff,
                    #fff 2px,
                    #000 2px,
                    #000 4px);
        }

        .title-text {
            background: #fff;
            padding: 0 10px;
            font-size: 10px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .close-box {
            position: absolute;
            left: 5px;
            top: 4px;
            width: 14px;
            height: 14px;
            border: 2px solid var(--mac-border);
            background: #fff;
        }

        .window-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .mac-icon-small {
            width: 48px;
            height: 48px;
        }

        .system-info {
            font-size: 10px;
            line-height: 1.4;
        }

        .system-info h2 {
            margin: 0 0 5px 0;
            font-size: 12px;
        }

        .stats-container {
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 9px;
        }

        .stat-bar-bg {
            width: 100px;
            height: 8px;
            border: 1px solid #000;
            background: #fff;
            position: relative;
        }

        .stat-bar-fill {
            height: 100%;
            background: #000;
            width: 0%;
            transition: width 0.5s;
        }

        /* Floating Icons */
        .floating-icon {
            position: absolute;
            width: 64px;
            height: 64px;
            pointer-events: none;
            z-index: 10;
            filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.1));
            transition: transform 0.1s ease-out;
        }
    </style>
</head>

<body>
    <div class="desktop" id="desktop">
        <!-- Floating Icons will be injected here -->

        <div class="window">
            <div class="title-bar">
                <div class="close-box"></div>
                <div class="title-text">About Hector's Macintosh</div>
            </div>
            <div class="window-content">
                <div class="info-row">
                    <svg class="mac-icon-small" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="4" width="24" height="20" stroke="black" stroke-width="2" />
                        <rect x="6" y="6" width="20" height="12" fill="black" />
                        <rect x="4" y="24" width="24" height="4" stroke="black" stroke-width="2" />
                        <rect x="12" y="25" width="8" height="1" fill="black" />
                    </svg>
                    <div class="system-info">
                        <h2>Macintosh II</h2>
                        <div>System Software 1.0</div>
                        <div style="margin-top: 2px;">(Hector Edition)</div>
                    </div>
                </div>
                <div class="stats-container">
                    <div class="stat-item">
                        <span>CPU Load:</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span id="cpu-val">0%</span>
                            <div class="stat-bar-bg">
                                <div id="cpu-bar" class="stat-bar-fill"></div>
                            </div>
                        </div>
                    </div>
                    <div class="stat-item">
                        <span>Memory:</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span id="ram-val">0 / 0</span>
                            <div class="stat-bar-bg">
                                <div id="ram-bar" class="stat-bar-fill"></div>
                            </div>
                        </div>
                    </div>
                    <div class="stat-item">
                        <span>Disk:</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span id="ssd-val">0 / 0</span>
                            <div class="stat-bar-bg">
                                <div id="ssd-bar" class="stat-bar-fill"></div>
                            </div>
                        </div>
                    </div>
                    <div class="stat-item">
                        <span>Temp:</span>
                        <span id="temp-val">0°C</span>
                    </div>
                </div>
            </div>
        </div>


    </div>

    <script>
        const icons = [
            // Happy Mac
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="24" height="22" stroke="black" stroke-width="2"/><rect x="8" y="8" width="2" height="2" fill="black"/><rect x="22" y="8" width="2" height="2" fill="black"/><path d="M10 20C10 20 12 22 16 22C20 22 22 20 22 20" stroke="black" stroke-width="2" stroke-linecap="round"/><rect x="4" y="26" width="24" height="2" fill="black"/></svg>`,
            // Bomb
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="18" r="10" fill="black"/><rect x="14" y="6" width="4" height="4" fill="black"/><path d="M18 4L22 2" stroke="black" stroke-width="2"/><path d="M22 4L24 6" stroke="black" stroke-width="2"/></svg>`,
            // Trash
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 8H24V26C24 27.1046 23.1046 28 22 28H10C8.89543 28 8 27.1046 8 26V8Z" stroke="black" stroke-width="2"/><rect x="6" y="4" width="20" height="4" stroke="black" stroke-width="2"/><rect x="12" y="2" width="8" height="2" stroke="black" stroke-width="2"/><line x1="12" y1="12" x2="12" y2="24" stroke="black" stroke-width="2"/><line x1="16" y1="12" x2="16" y2="24" stroke="black" stroke-width="2"/><line x1="20" y1="12" x2="20" y2="24" stroke="black" stroke-width="2"/></svg>`,
            // Floppy
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="24" height="24" stroke="black" stroke-width="2"/><rect x="8" y="4" width="16" height="10" stroke="black" stroke-width="2"/><rect x="10" y="18" width="12" height="10" stroke="black" stroke-width="2"/><rect x="20" y="6" width="2" height="6" fill="black"/></svg>`
        ];

        const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F43', '#A55EEF', '#45AAF2'];

        class FloatingIcon {
            constructor(svg, color) {
                this.element = document.createElement('div');
                this.element.className = 'floating-icon';
                this.element.innerHTML = svg;

                // Set initial color
                const svgElement = this.element.querySelector('svg');
                svgElement.style.filter = `drop-shadow(0 0 2px ${color})`;
                const paths = svgElement.querySelectorAll('path, rect, circle, line');
                paths.forEach(p => {
                    if (p.getAttribute('fill') === 'black') p.setAttribute('fill', color);
                    if (p.getAttribute('stroke') === 'black') p.setAttribute('stroke', color);
                });

                document.getElementById('desktop').appendChild(this.element);

                this.x = Math.random() * (window.innerWidth - 64);
                this.y = Math.random() * (window.innerHeight - 64);
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.baseScale = 0.8 + Math.random() * 0.4;
                this.scale = this.baseScale;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > window.innerWidth - 64) this.vx *= -1;
                if (this.y < 0 || this.y > window.innerHeight - 64) this.vy *= -1;

                this.element.style.transform = `translate(${this.x}px, ${this.y}px) scale(${this.baseScale})`;
            }
        }

        const floatingIcons = [];
        for (let i = 0; i < 12; i++) {
            floatingIcons.push(new FloatingIcon(
                icons[i % icons.length],
                colors[Math.floor(Math.random() * colors.length)]
            ));
        }

        // Stats Polling
        async function updateStats() {
            try {
                const res = await fetch('http://localhost:8080/stats');
                const data = await res.json();

                document.getElementById('cpu-val').textContent = `${data.cpu_usage.toFixed(1)}%`;
                document.getElementById('cpu-bar').style.width = `${data.cpu_usage}%`;

                document.getElementById('ram-val').textContent = `${data.used_mem} / ${(parseFloat(data.used_mem) + parseFloat(data.free_mem)).toFixed(1)}G`;
                let ramPercent = (parseFloat(data.used_mem) / (parseFloat(data.used_mem) + parseFloat(data.free_mem))) * 100;
                document.getElementById('ram-bar').style.width = `${ramPercent}%`;

                document.getElementById('ssd-val').textContent = `${(parseFloat(data.ssd_total) - parseFloat(data.ssd_free)).toFixed(1)}G / ${data.ssd_total}`;
                document.getElementById('ssd-bar').style.width = `${data.ssd_usage}%`;

                document.getElementById('temp-val').textContent = `${data.temp}°C`;
            } catch (e) {
                console.error("Stats fetch failed", e);
            }
        }
        setInterval(updateStats, 2000);
        updateStats();

        function animate() {
            floatingIcons.forEach(icon => icon.update());
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            floatingIcons.forEach(icon => {
                icon.x = Math.min(icon.x, window.innerWidth - 64);
                icon.y = Math.min(icon.y, window.innerHeight - 64);
            });
        });
    </script>
</body>

</html>
