<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Hector's Macintosh 1984</title>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #72a0a0;
            /* Classic muted teal/grey */
            --mac-border: #000;
            --mac-window-bg: #fff;
            --mac-title-bg: #fff;
            --pixel-font: 'Silkscreen', cursive;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: var(--pixel-font);
            cursor: default;
        }

        /* Desktop Grid Pattern */
        .desktop {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(0, 0, 0, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Macintosh Window Style */
        .window {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 380px;
            background: var(--mac-window-bg);
            border: 2px solid var(--mac-border);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.2);
            z-index: 100;
        }

        .title-bar {
            height: 24px;
            border-bottom: 2px solid var(--mac-border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: repeating-linear-gradient(0deg,
                    #fff,
                    #fff 2px,
                    #000 2px,
                    #000 4px);
        }

        .title-text {
            background: #fff;
            padding: 0 10px;
            font-size: 10px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .close-box {
            position: absolute;
            left: 5px;
            top: 4px;
            width: 14px;
            height: 14px;
            border: 2px solid var(--mac-border);
            background: #fff;
        }

        .window-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .mac-icon-small {
            width: 48px;
            height: 48px;
        }

        .system-info {
            font-size: 10px;
            line-height: 1.4;
        }

        .system-info h2 {
            margin: 0 0 5px 0;
            font-size: 12px;
        }

        .stats-container {
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 9px;
        }

        .stat-bar-bg {
            width: 100px;
            height: 8px;
            border: 1px solid #000;
            background: #fff;
            position: relative;
        }

        .stat-bar-fill {
            height: 100%;
            background: #000;
            width: 0%;
            transition: width 0.5s;
        }

        /* Floating Icons */
        .floating-icon {
            position: absolute;
            width: 64px;
            height: 64px;
            pointer-events: none;
            z-index: 10;
            filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.1));
            transition: transform 0.1s ease-out;
        }
    </style>
</head>

<body>
    <div class="desktop" id="desktop">
        <!-- Floating Icons will be injected here -->

        <div class="window">
            <div class="title-bar">
                <div class="close-box"></div>
                <div class="title-text">About Hector's Macintosh</div>
            </div>
            <div class="window-content">
                <div class="info-row">
                    <svg class="mac-icon-small" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="4" width="24" height="20" stroke="black" stroke-width="2" />
                        <rect x="6" y="6" width="20" height="12" fill="black" />
                        <rect x="4" y="24" width="24" height="4" stroke="black" stroke-width="2" />
                        <rect x="12" y="25" width="8" height="1" fill="black" />
                    </svg>
                    <div class="system-info">
                        <h2>Macintosh II</h2>
                        <div>System Software 1.0</div>
                        <div style="margin-top: 2px;">(Hector Edition)</div>
                    </div>
                </div>
                <div class="stats-container">
                    <div class="stat-item">
                        <span>CPU Load:</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span id="cpu-val">0%</span>
                            <div class="stat-bar-bg">
                                <div id="cpu-bar" class="stat-bar-fill"></div>
                            </div>
                        </div>
                    </div>
                    <div class="stat-item">
                        <span>Memory:</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span id="ram-val">0 / 0</span>
                            <div class="stat-bar-bg">
                                <div id="ram-bar" class="stat-bar-fill"></div>
                            </div>
                        </div>
                    </div>
                    <div class="stat-item">
                        <span>Disk:</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span id="ssd-val">0 / 0</span>
                            <div class="stat-bar-bg">
                                <div id="ssd-bar" class="stat-bar-fill"></div>
                            </div>
                        </div>
                    </div>
                    <div class="stat-item">
                        <span>Temp:</span>
                        <span id="temp-val">0°C</span>
                    </div>
                </div>
            </div>
        </div>


    </div>

    <script>
        const icons = [
            // Apple Retro
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M23.06 17.5c0-2.31 1.88-3.41 1.97-3.47-1.07-1.57-2.73-1.78-3.32-1.81-1.41-.14-2.75.84-3.47.84-.71 0-1.84-.81-3.03-.79-1.57.02-3.02.91-3.83 2.32-1.64 2.84-.42 7.04 1.17 9.34.78 1.12 1.7 2.38 2.91 2.34 1.17-.05 1.61-.75 3.02-.75 1.41 0 1.81.75 3.04.72 1.25-.02 2.04-1.14 2.81-2.26.89-1.3 1.25-2.55 1.28-2.61-.03-.02-2.45-.94-2.45-3.87zM19.12 10.36c.63-.76 1.05-1.82.94-2.88-.91.04-2.01.61-2.67 1.38-.59.68-1.11 1.76-1 2.8.99.08 2.02-.45 2.73-1.3z" fill="black"/></svg>`,
            // Python
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 4.1c-4.4 0-4.1 1.9-4.1 1.9v2.5h4.2v0.6h-5.9s-3.5-0.4-3.5 4c0 4.4 3.1 4.2 3.1 4.2h1.8v-2.6c0 0-0.1-3.1 3.1-3.1h5.3s3 0 3-2.9-2.7-3.2-2.7-3.2l-4.3-1.4s-0.1 0-0.1 0zM13.6 5.8c0.5 0 0.8 0.4 0.8 0.8s-0.4 0.8-0.8 0.8-0.8-0.4-0.8-0.8 0.4-0.8 0.8-0.8zM16 27.9c4.4 0 4.1-1.9 4.1-1.9v-2.5h-4.2v-0.6h5.9s3.5 0.4 3.5-4c0-4.4-3.1-4.2-3.1-4.2h-1.8v2.6c0 0 0.1 3.1-3.1 3.1h-5.3s-3 0-3 2.9 2.7 3.2 2.7 3.2l4.3 1.4s-0.1 0-0.1 0zM18.4 26.2c-0.5 0-0.8-0.4-0.8-0.8s0.4-0.8 0.8-0.8 0.8 0.4 0.8 0.8-0.4 0.8-0.8 0.8z" fill="black"/></svg>`,
            // Java (Coffee Cup)
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21.7 13.5c-.2-.6-.6-1.1-1.1-1.4-.4-.2-.8-.4-1.3-.4h-10c-.8 0-1.5.7-1.5 1.5v4.5c0 3.3 2.7 6 6 6s6-2.7 6-6v-.5c1.1-.1 1.9-1 1.9-2.1v-1.6zm-1.5 3.7c0 2.2-1.8 4-4 4s-4-1.8-4-4V14.5h8v2.7zm1.5-1.1c0 .3-.2.6-.5.6h-1v-2.2h1c.3 0 .5.3.5.6v1zm-8.8 8.4h4.6c.3 0 .6.3.6.6s-.3.6-.6.6h-4.6c-.3 0-.6-.3-.6-.6s.3-.6.6-.6zM13 11c-.3 0-.6-.3-.6-.6 0-1.1.9-2 2-2s2 .9 2 2c0 .3-.3.6-.6.6s-.6-.3-.6-.6c0-.4-.3-.8-.8-.8s-.8.4-.8.8c.1.3-.2.6-.6.6z" fill="black"/></svg>`,
            // HTML5 Shield
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 4l2.5 21.5L16 28l8.5-2.5L27 4H5zm18 4.5l-.2 1.5H11.7l.2 1.8h10.9l-.6 6.3L16 20.3l-6.2-2.2-.4-4.1h2.2l.2 2.3 4.2 1.4 4.1-1.3.4-3.7H9.2l-.7-7.8h14.5z" fill="black"/></svg>`,
            // GitHub Octocat
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 2C8.27 2 2 8.27 2 16c0 6.18 4.01 11.42 9.57 13.27.7.13.96-.3.96-.67v-2.38c-3.9.85-4.72-1.88-4.72-1.88-.64-1.62-1.56-2.05-1.56-2.05-1.27-.87.1-.85.1-.85 1.41.1 2.15 1.44 2.15 1.44 1.25 2.15 3.29 1.53 4.09 1.17.13-.91.49-1.53.89-1.88-3.11-.35-6.38-1.55-6.38-6.91 0-1.53.55-2.78 1.44-3.75-.15-.35-.63-1.78.14-3.7 0 0 1.17-.37 3.84 1.43 1.12-.31 2.31-.46 3.5-.47 1.19.01 2.38.16 3.5.47 2.66-1.8 3.83-1.43 3.83-1.43.77 1.92.29 3.35.14 3.7.9 0.97 1.44 2.22 1.44 3.75 0 5.38-3.28 6.55-6.4 6.9.5.43.95 1.28.95 2.58v3.83c0 .38.25.81.97.67C25.99 27.42 30 22.18 30 16c0-7.73-6.27-14-14-14z" fill="black"/></svg>`,
            // Linux (Tux Silhouette)
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 4c-3.3 0-6 2.7-6 6 0 1.1.3 2.1.8 3-1.1 1.1-1.8 2.6-1.8 4.3 0 2.6 1.6 4.7 3.8 5.6C11.5 24.3 10 26.1 10 28h12c0-1.9-1.5-3.7-2.8-5.1 2.2-.9 3.8-3 3.8-5.6 0-1.7-.7-3.2-1.8-4.3.5-.9.8-1.9.8-3 0-3.3-2.7-6-6-6zm-2 5.5c.3 0 .5.2.5.5s-.2.5-.5.5-.5-.2-.5-.5.2-.5.5-.5zm4 0c.3 0 .5.2.5.5s-.2.5-.5.5-.5-.2-.5-.5.2-.5.5-.5zm-2 7c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z" fill="black"/></svg>`,
            // Kotlin
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M30 30H2L30 2V30Z" fill="black"/><path d="M2 30V2H30L2 30Z" fill="black" fill-opacity="0.5"/><path d="M2 30L16 16L30 30H2Z" fill="black" fill-opacity="0.8"/></svg>`,
            // Windows Retro
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="11" height="11" fill="black"/><rect x="17" y="4" width="11" height="11" fill="black"/><rect x="4" y="17" width="11" height="11" fill="black"/><rect x="17" y="17" width="11" height="11" fill="black"/></svg>`,
            // Developer SVG (Replaces 👨🏻‍💻)
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 10L4 16L10 22" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 10L28 16L22 22" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 6L14 26" stroke="black" stroke-width="2" stroke-linecap="round"/></svg>`,
            // Music SVG (Replaces 🎶)
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 24V6L24 4V22" stroke="black" stroke-width="2"/><circle cx="7" cy="24" r="3" fill="black"/><circle cx="21" cy="22" r="3" fill="black"/></svg>`,
            // Eagle SVG (Replaces 🦅)
            `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 12C10 10 16 4 16 4C16 4 22 10 28 12C28 12 24 16 16 16C8 16 4 12 4 12Z" fill="black"/><path d="M16 16L14 22L16 28L18 22L16 16Z" fill="black"/><circle cx="13" cy="10" r="1" fill="white"/><circle cx="19" cy="10" r="1" fill="white"/></svg>`
        ];

        const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F43', '#A55EEF', '#45AAF2'];

        class FloatingIcon {
            constructor(content, color) {
                this.element = document.createElement('div');
                this.element.className = 'floating-icon';
                this.element.innerHTML = content;

                const svgElement = this.element.querySelector('svg');
                svgElement.style.filter = `drop-shadow(0 0 2px ${color})`;

                const paths = svgElement.querySelectorAll('path, rect, circle, line');
                paths.forEach(p => {
                    if (p.getAttribute('fill') === 'black') p.setAttribute('fill', color);
                    if (p.getAttribute('stroke') === 'black') p.setAttribute('stroke', color);
                });

                document.getElementById('desktop').appendChild(this.element);

                this.x = Math.random() * (window.innerWidth - 64);
                this.y = Math.random() * (window.innerHeight - 64);
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.baseScale = 0.8 + Math.random() * 0.4;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > window.innerWidth - 64) this.vx *= -1;
                if (this.y < 0 || this.y > window.innerHeight - 64) this.vy *= -1;

                this.element.style.transform = `translate(${this.x}px, ${this.y}px) scale(${this.baseScale})`;
            }
        }

        const floatingIcons = [];
        for (let i = 0; i < 12; i++) {
            floatingIcons.push(new FloatingIcon(
                icons[i % icons.length],
                colors[Math.floor(Math.random() * colors.length)]
            ));
        }

        // Stats Polling
        async function updateStats() {
            try {
                const res = await fetch('http://localhost:8080/stats');
                const data = await res.json();

                document.getElementById('cpu-val').textContent = `${data.cpu_usage.toFixed(1)}%`;
                document.getElementById('cpu-bar').style.width = `${data.cpu_usage}%`;

                document.getElementById('ram-val').textContent = `${data.used_mem} / ${(parseFloat(data.used_mem) + parseFloat(data.free_mem)).toFixed(1)}G`;
                let ramPercent = (parseFloat(data.used_mem) / (parseFloat(data.used_mem) + parseFloat(data.free_mem))) * 100;
                document.getElementById('ram-bar').style.width = `${ramPercent}%`;

                document.getElementById('ssd-val').textContent = `${(parseFloat(data.ssd_total) - parseFloat(data.ssd_free)).toFixed(1)}G / ${data.ssd_total}`;
                document.getElementById('ssd-bar').style.width = `${data.ssd_usage}%`;

                document.getElementById('temp-val').textContent = `${data.temp}°C`;
            } catch (e) {
                console.error("Stats fetch failed", e);
            }
        }
        setInterval(updateStats, 2000);
        updateStats();

        function animate() {
            floatingIcons.forEach(icon => icon.update());
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            floatingIcons.forEach(icon => {
                icon.x = Math.min(icon.x, window.innerWidth - 64);
                icon.y = Math.min(icon.y, window.innerHeight - 64);
            });
        });
    </script>
</body>

</html>
