<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SymbiOSis Matrix Edition</title>
    <style>
        body {
            background-color: black;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .overlay {
            position: relative;
            z-index: 2;
            text-align: center;
            text-shadow: 0 0 10px #00ff41;
            pointer-events: none;
        }

        .logo {
            font-family: monospace;
            white-space: pre;
            font-size: 14px;
            line-height: 1.2;
            animation: glitch 3s infinite;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-top: 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .subtitle span {
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px #fff, 0 0 20px #00ff41;
        }

        .terminal {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 150px;
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid #00ff41;
            font-size: 10px;
            padding: 10px;
            overflow: hidden;
            z-index: 3;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            border-radius: 4px;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-2px, 2px); text-shadow: 2px 0 red, -2px 0 blue; }
            4% { transform: translate(2px, -2px); text-shadow: -2px 0 red, 2px 0 blue; }
            6% { transform: translate(0); }
            100% { transform: translate(0); }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: #00ff41;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .logo-img {
            width: 120px;
            mix-blend-mode: screen;
            filter: drop-shadow(0 0 10px #00ff41);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div class="overlay">
        <div class="logo-img" style="display: flex; align-items: center; justify-content: center; color: #0f0; font-weight: bold; font-family: monospace; border: 2px solid #0f0; background: rgba(0,255,0,0.1); border-radius: 10px; font-size: 14px; box-shadow: 0 0 10px #0f0;">MTRX</div>
        <div class="logo">
 ██╗  ██╗███████╗ ██████╗████████╗ ██████╗ ██████╗ 
 ██║  ██║██╔════╝██╔════╝╚══██╔══╝██╔═══██╗██╔══██╗
 ███████║█████╗  ██║        ██║   ██║   ██║██████╔╝
 ██╔══██║██╔══╝  ██║        ██║   ██║   ██║██╔══██╗
 ██║  ██║███████╗╚██████╗   ██║   ╚██████╔╝██║  ██║
 ╚═╝  ╚═╝╚══════╝ ╚═════╝   ╚═╝    ╚═════╝ ╚═╝  ╚═╝</div>
        <div class="subtitle">SYMBI<span>OS</span>IS v1.0<span class="cursor"></span></div>
    </div>

    <div class="terminal" id="term-logs"></div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん";
        const charArr = chars.split("");

        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00ff41";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = charArr[Math.floor(Math.random() * charArr.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        const terminal = document.getElementById('term-logs');
        const logLines = [
            "> Initializing SymbiOSis kernel...",
            "> Neural link established...",
            "> Memory pressure: HIGH (Dreaming...)",
            "> Bypassing Sequoia restrictions...",
            "> Loading aesthetic modules...",
            "> System status: OPTIMAL",
            "> Tracking user intent...",
            "> Accessing deeper layers...",
            "> SymbiOSis core running..."
        ];

        function addLog() {
            const line = logLines[Math.floor(Math.random() * logLines.length)];
            const div = document.createElement('div');
            div.textContent = line;
            terminal.appendChild(div);
            if (terminal.childNodes.length > 10) {
                terminal.removeChild(terminal.childNodes[0]);
            }
            setTimeout(addLog, Math.random() * 2000 + 500);
        }

        setInterval(drawMatrix, 35);
        addLog();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
